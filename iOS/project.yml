name: ToyRotationTracker
options:
  bundleIdPrefix: com.shimondeitel.toyrotation
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ToyRotationTracker:
    type: application
    platform: iOS
    sources:
      - path: ToyRotationTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toyrotation
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ToyRotationTracker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ToyRotationTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ToyRotationTrackerTests
      - path: ToyRotationTracker.storekit
    dependencies:
      - target: ToyRotationTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toyrotation.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ToyRotationTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ToyRotationTrackerUITests
    dependencies:
      - target: ToyRotationTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toyrotation.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ToyRotationTracker:
    build:
      targets:
        ToyRotationTracker: all
        ToyRotationTrackerTests: [test]
        ToyRotationTrackerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: ToyRotationTracker.storekit
    test:
      config: Debug
      storeKitConfiguration: ToyRotationTracker.storekit
      targets:
        - ToyRotationTrackerTests
        - ToyRotationTrackerUITests
    archive:
      config: Release
